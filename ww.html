<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3RMOT - متجر حسابات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .store-title { color: #667eea; font-size: 28px; }
        .admin-fixed-btn { position: fixed; bottom: 20px; left: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .admin-fixed-btn:hover { transform: scale(1.05); }
        .filter-section { background: white; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .filter-title { font-size: 18px; font-weight: bold; color: #667eea; margin-bottom: 15px; text-align: center; }
        .filter-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .filter-btn { background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .reset-filter-btn { background: #ff6b6b; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }
        .categories-tabs { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .category-btn { background: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; color: #667eea; transition: 0.3s; }
        .category-btn:hover, .category-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 30px; }
        .product-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: 0.3s; position: relative; }
        .product-card:hover { transform: translateY(-5px); }
        .product-code { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 10; }
        .product-gallery { width: 100%; margin-bottom: 15px; }
        .main-image { width: 100%; height: 250px; background: #f0f0f0; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .main-image:hover img { transform: scale(1.05); }
        .thumbnail-container { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumbnail { width: 60px; height: 60px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.3s; flex-shrink: 0; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { font-size: 22px; color: #333; margin-bottom: 10px; }
        .product-desc { color: #666; margin-bottom: 15px; line-height: 1.5; }
        .product-price { font-size: 28px; color: #667eea; font-weight: bold; margin-bottom: 15px; }
        .buy-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .copy-info-btn { background: #25D366; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 10px; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; background: none; border: none; }
        .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); color: white; border: none; font-size: 40px; padding: 15px 20px; cursor: pointer; border-radius: 50%; transition: 0.3s; }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .whatsapp-modal, .login-modal, .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .whatsapp-box, .login-box { background: white; padding: 30px; border-radius: 20px; width: 450px; max-width: 90%; text-align: center; }
        .whatsapp-number { background: #25D366; color: white; padding: 15px; border-radius: 10px; font-size: 22px; font-weight: bold; margin: 20px 0; }
        .whatsapp-number a { color: white; text-decoration: none; }
        .order-details { background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: right; }
        .copy-btn { background: #667eea; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .admin-panel { overflow-y: auto; padding: 20px; }
        .admin-container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .save-and-download-btn { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .close-admin { background: #ff6b6b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .admin-section { margin-bottom: 40px; }
        .admin-section h3 { color: #667eea; margin-bottom: 20px; font-size: 24px; }
        .admin-products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        .admin-product-card { background: #f5f5f5; border-radius: 15px; padding: 20px; }
        .admin-product-card input, .admin-product-card textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .images-gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        .image-item { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-image-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
        .add-url-section { background: #e8e8e8; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .add-url-section label { font-weight: bold; display: block; margin-bottom: 5px; }
        .url-input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .url-input-group input { flex: 1; }
        .add-url-btn { background: #667eea; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .save-product-btn { background: #4ecdc4; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; margin-right: 10px; }
        .delete-product-btn { background: #ff6b6b; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .add-product-form { background: #e8e8e8; padding: 25px; border-radius: 15px; margin-bottom: 30px; }
        .add-product-form input, .add-product-form select, .add-product-form textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .add-btn { background: #667eea; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; }
        footer { text-align: center; margin-top: 50px; color: white; padding: 20px; }
        .category-section { display: none; }
        .active-section { display: block; }
        .toast-message { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; padding: 12px 20px; border-radius: 8px; z-index: 3000; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body>
    <button class="admin-fixed-btn" onclick="showLoginModal()">👑 لوحة التحكم</button>

    <div class="container">
        <header>
            <h1 class="store-title">🏪 3RMOT</h1>
        </header>

        <div class="filter-section">
            <div class="filter-title">🔍 فلترة حسب السعر</div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterByPrice('all')">الكل</button>
                <button class="filter-btn" onclick="filterByPrice('0-100')">من 0 إلى 100 ريال</button>
                <button class="filter-btn" onclick="filterByPrice('100-300')">من 100 إلى 300 ريال</button>
                <button class="filter-btn" onclick="filterByPrice('300-500')">من 300 إلى 500 ريال</button>
                <button class="filter-btn" onclick="filterByPrice('500+')">500 ريال فأكثر</button>
                <button class="reset-filter-btn" onclick="resetFilter()">🔄 إعادة تعيين</button>
            </div>
        </div>

        <div class="categories-tabs">
            <button class="category-btn active" onclick="switchCategory('accounts')">🎮 حسابات</button>
            <button class="category-btn" onclick="switchCategory('gems')">💎 شحن جواهر</button>
            <button class="category-btn" onclick="switchCategory('subscriptions')">📺 اشتراكات</button>
        </div>

        <div id="accounts-section" class="category-section active-section"><div class="products-grid" id="accountsGrid"></div></div>
        <div id="gems-section" class="category-section"><div class="products-grid" id="gemsGrid"></div></div>
        <div id="subscriptions-section" class="category-section"><div class="products-grid" id="subscriptionsGrid"></div></div>

        <footer><p>© 2024 3RMOT - جميع الحقوق محفوظة</p><p>📞 للتواصل: <strong>+966508139672</strong></p></footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-prev" onclick="prevImage(event)">❮</button>
        <button class="lightbox-next" onclick="nextImage(event)">❯</button>
        <img id="lightbox-img" src="">
    </div>

    <div id="loginModal" class="login-modal">
        <div class="login-box"><h2>🔐 دخول الأدمن</h2>
            <input type="text" id="adminUsername" placeholder="اسم المستخدم">
            <input type="password" id="adminPassword" placeholder="كلمة المرور">
            <button onclick="loginAdmin()">دخول</button>
            <button onclick="closeLoginModal()" style="background:#ccc; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <div id="whatsappModal" class="whatsapp-modal">
        <div class="whatsapp-box"><h2>💬 الدفع عبر واتساب</h2>
            <div class="order-details" id="orderDetails"></div>
            <div class="whatsapp-number">📱 <a href="#" id="whatsappLink" target="_blank">+966508139672</a></div>
            <button class="copy-btn" onclick="copyProductCode()">📋 نسخ رقم المنتج</button>
            <button class="copy-btn" onclick="copyAllProductInfo()">📋 نسخ جميع المعلومات</button>
            <button class="close-modal-btn" onclick="closeWhatsappModal()">إغلاق</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-container">
            <div class="admin-header">
                <h2>👑 لوحة التحكم - إدارة المتجر</h2>
                <div><button class="save-and-download-btn" onclick="saveAndDownload()">💾 حفظ وتحميل الملف والعودة للعرض</button>
                <button class="close-admin" onclick="closeAdminPanel()">✖ إغلاق</button></div>
            </div>
            <div class="add-product-form"><h3>➕ إضافة منتج جديد</h3>
                <select id="newProductCategory"><option value="accounts">🎮 حسابات</option><option value="gems">💎 شحن جواهر</option><option value="subscriptions">📺 اشتراكات</option></select>
                <input type="text" id="newProductName" placeholder="اسم المنتج">
                <textarea id="newProductDesc" placeholder="وصف المنتج" rows="2"></textarea>
                <input type="number" id="newProductPrice" placeholder="السعر">
                <div class="add-url-section">
                    <label>🔗 رابط الصورة (من ImgBB أو أي موقع):</label>
                    <div class="url-input-group">
                        <input type="text" id="newProductImageUrl" placeholder="https://i.ibb.co/xxxxx/image.jpg">
                        <button class="add-url-btn" onclick="addNewProductWithUrl()">➕ إضافة المنتج بالرابط</button>
                    </div>
                </div>
            </div>
            <div class="admin-section"><h3>🎮 إدارة الحسابات</h3><div class="admin-products-grid" id="adminAccountsGrid"></div></div>
            <div class="admin-section"><h3>💎 إدارة شحن الجواهر</h3><div class="admin-products-grid" id="adminGemsGrid"></div></div>
            <div class="admin-section"><h3>📺 إدارة الاشتراكات</h3><div class="admin-products-grid" id="adminSubscriptionsGrid"></div></div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "966508139672";
        
        // ==================== البيانات مع صور جاهزة ====================
        let DEFAULT_DATA = {
            accounts: [
                { id: 1, code: "ACC001", name: "حساب فورت نايت", desc: "حساب نادر فيه 50 skin + 1000 V-Bucks", price: 150, images: ["https://picsum.photos/id/200/300/200"], duration: "" },
                { id: 2, code: "ACC002", name: "حساب ببجي موبايل", desc: "رتبة أسطوري + أزياء نادرة", price: 120, images: ["https://picsum.photos/id/100/300/200"], duration: "" },
                { id: 3, code: "ACC003", name: "حساب ماين كرافت", desc: "نسخة كاملة + ماودات", price: 100, images: ["https://picsum.photos/id/26/300/200"], duration: "" }
            ],
            gems: [
                { id: 101, code: "GEM001", name: "500 جوهرة", desc: "شحن فوري لجواهر اللعبة", price: 50, images: ["https://picsum.photos/id/15/300/200"], duration: "" },
                { id: 102, code: "GEM002", name: "1000 جوهرة", desc: "شحن فوري + هدية 100 جوهرة", price: 90, images: ["https://picsum.photos/id/30/300/200"], duration: "" },
                { id: 103, code: "GEM003", name: "5000 جوهرة", desc: "أفضل قيمة - شحن فوري", price: 400, images: ["https://picsum.photos/id/20/300/200"], duration: "" }
            ],
            subscriptions: [
                { id: 201, code: "SUB001", name: "نتفلكس - شهر", desc: "اشتراك شهر - 4K Ultra HD", price: 40, images: ["https://picsum.photos/id/200/300/200"], duration: "شهر" },
                { id: 202, code: "SUB002", name: "نتفلكس - 3 شهور", desc: "اشتراك 3 شهور - توفير 15%", price: 100, images: ["https://picsum.photos/id/100/300/200"], duration: "3 شهور" },
                { id: 203, code: "SUB003", name: "سبوتيفاي بريميوم", desc: "اشتراك شهر - بدون إعلانات", price: 25, images: ["https://picsum.photos/id/26/300/200"], duration: "شهر" }
            ]
        };
        
        let storeData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        let nextIds = { accounts: 4, gems: 104, subscriptions: 204 };
        let currentProductForWhatsapp = null;
        let currentFilter = 'all';
        let currentLightboxImages = [];
        let currentLightboxIndex = 0;

        function loadStoreData() {
            const savedData = localStorage.getItem('storeData');
            if(savedData) {
                try { 
                    const parsed = JSON.parse(savedData);
                    if(parsed.accounts && parsed.gems && parsed.subscriptions) storeData = parsed;
                } catch(e) {}
            }
            updateNextIds();
            saveStoreData();
        }
        
        function updateNextIds() {
            if(storeData.accounts.length) nextIds.accounts = Math.max(...storeData.accounts.map(p => p.id)) + 1;
            if(storeData.gems.length) nextIds.gems = Math.max(...storeData.gems.map(p => p.id)) + 1;
            if(storeData.subscriptions.length) nextIds.subscriptions = Math.max(...storeData.subscriptions.map(p => p.id)) + 1;
        }

        function saveStoreData() { 
            localStorage.setItem('storeData', JSON.stringify(storeData)); 
        }

        function filterByPrice(range) {
            currentFilter = range;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayAll();
        }
        
        function resetFilter() {
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn')[0].classList.add('active');
            displayAll();
            showToast('✅ تم إعادة تعيين الفلترة');
        }
        
        function filterProducts(products) {
            if(currentFilter === 'all') return products;
            if(currentFilter === '500+') return products.filter(p => p.price >= 500);
            const [min, max] = currentFilter.split('-');
            return products.filter(p => p.price >= parseInt(min) && p.price <= parseInt(max));
        }

        function displayAll() { 
            displayAccounts(); 
            displayGems(); 
            displaySubscriptions(); 
        }

        function createProductCard(p, type) {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            let galleryHTML = '';
            if(p.images && p.images.length > 0) {
                let thumbnails = '';
                p.images.forEach((img, idx) => { 
                    thumbnails += `<div class="thumbnail" onclick="openLightbox(${p.id}, '${type}', ${idx})"><img src="${img}" alt=""></div>`; 
                });
                galleryHTML = `
                    <div class="product-gallery">
                        <div class="main-image" onclick="openLightbox(${p.id}, '${type}', 0)">
                            <img src="${p.images[0]}" alt="${p.name}">
                        </div>
                        <div class="thumbnail-container">${thumbnails}</div>
                    </div>
                `;
            } else { 
                galleryHTML = `<div class="product-gallery"><div class="main-image"><img src="https://picsum.photos/id/1/300/200" alt="بدون صورة"></div></div>`; 
            }
            
            card.innerHTML = `
                <div class="product-code">🔢 ${p.code}</div>
                ${galleryHTML}
                ${type === 'subscription' && p.duration ? `<div style="background:#ff6b6b; color:white; padding:3px 8px; border-radius:5px; display:inline-block; margin-bottom:10px;">📅 ${p.duration}</div>` : ''}
                <h3 class="product-title">${escapeHtml(p.name)}</h3>
                <p class="product-desc">${escapeHtml(p.desc)}</p>
                <div class="product-price">${p.price} ريال</div>
                <button class="buy-btn" onclick="buyProduct(${p.id}, '${type}')">💰 شراء عبر واتساب</button>
                <button class="copy-info-btn" onclick="copyProductInfo('${p.code}', '${escapeHtml(p.name)}', ${p.price})">📋 نسخ معلومات المنتج</button>
            `;
            return card;
        }
        
        function escapeHtml(text) { 
            if(!text) return ''; 
            return text.replace(/[&<>]/g, function(m) { 
                if(m === '&') return '&amp;'; 
                if(m === '<') return '&lt;'; 
                if(m === '>') return '&gt;'; 
                return m; 
            }); 
        }

        function displayAccounts() { 
            const grid = document.getElementById('accountsGrid'); 
            if(!grid) return; 
            grid.innerHTML = ''; 
            let filtered = filterProducts(storeData.accounts); 
            filtered.forEach(p => grid.appendChild(createProductCard(p, 'account'))); 
            if(!filtered.length) grid.innerHTML = '<div style="background:white; padding:40px; text-align:center; border-radius:15px;">❌ لا توجد منتجات</div>'; 
        }
        
        function displayGems() { 
            const grid = document.getElementById('gemsGrid'); 
            if(!grid) return; 
            grid.innerHTML = ''; 
            let filtered = filterProducts(storeData.gems); 
            filtered.forEach(p => grid.appendChild(createProductCard(p, 'gem'))); 
            if(!filtered.length) grid.innerHTML = '<div style="background:white; padding:40px; text-align:center; border-radius:15px;">❌ لا توجد منتجات</div>'; 
        }
        
        function displaySubscriptions() { 
            const grid = document.getElementById('subscriptionsGrid'); 
            if(!grid) return; 
            grid.innerHTML = ''; 
            let filtered = filterProducts(storeData.subscriptions); 
            filtered.forEach(p => grid.appendChild(createProductCard(p, 'subscription'))); 
            if(!filtered.length) grid.innerHTML = '<div style="background:white; padding:40px; text-align:center; border-radius:15px;">❌ لا توجد منتجات</div>'; 
        }

        function openLightbox(productId, type, index) {
            let product; 
            if(type === 'account') product = storeData.accounts.find(p => p.id === productId); 
            else if(type === 'gem') product = storeData.gems.find(p => p.id === productId); 
            else product = storeData.subscriptions.find(p => p.id === productId);
            
            if(product && product.images && product.images.length) { 
                currentLightboxImages = product.images; 
                currentLightboxIndex = index; 
                document.getElementById('lightbox-img').src = currentLightboxImages[currentLightboxIndex]; 
                document.getElementById('lightbox').style.display = 'flex'; 
            }
        }
        
        function closeLightbox() { 
            document.getElementById('lightbox').style.display = 'none'; 
        }
        
        function prevImage(event) { 
            event.stopPropagation(); 
            currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length; 
            document.getElementById('lightbox-img').src = currentLightboxImages[currentLightboxIndex]; 
        }
        
        function nextImage(event) { 
            event.stopPropagation(); 
            currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length; 
            document.getElementById('lightbox-img').src = currentLightboxImages[currentLightboxIndex]; 
        }

        function copyProductInfo(code, name, price) { 
            const info = `🛍️ معلومات المنتج:\n🔢 رقم المنتج: ${code}\n🏷️ اسم المنتج: ${name}\n💰 السعر: ${price} ريال\n📞 للشراء: واتساب +966508139672`; 
            navigator.clipboard.writeText(info); 
            showToast('✅ تم نسخ معلومات المنتج'); 
        }
        
        function copyAllProductInfo() { 
            if(currentProductForWhatsapp) { 
                const info = `🛍️ معلومات الطلب:\n🔢 رقم المنتج: ${currentProductForWhatsapp.code}\n🏷️ اسم المنتج: ${currentProductForWhatsapp.name}\n📝 الوصف: ${currentProductForWhatsapp.desc}\n💰 السعر: ${currentProductForWhatsapp.price} ريال\n📞 للدفع: واتساب +966508139672`; 
                navigator.clipboard.writeText(info); 
                showToast('✅ تم نسخ جميع المعلومات'); 
            } 
        }
        
        function showToast(message) { 
            const toast = document.createElement('div'); 
            toast.className = 'toast-message'; 
            toast.textContent = message; 
            document.body.appendChild(toast); 
            setTimeout(() => toast.remove(), 2000); 
        }

        function buyProduct(id, type) { 
            let product; 
            if(type === 'account') product = storeData.accounts.find(p => p.id === id); 
            else if(type === 'gem') product = storeData.gems.find(p => p.id === id); 
            else product = storeData.subscriptions.find(p => p.id === id); 
            if(product) { 
                currentProductForWhatsapp = product; 
                showWhatsappModal(product); 
            } 
        }
        
        function showWhatsappModal(product) { 
            const modal = document.getElementById('whatsappModal'); 
            document.getElementById('orderDetails').innerHTML = `<p><strong>📦 رقم المنتج:</strong> ${product.code}</p><p><strong>🏷️ اسم المنتج:</strong> ${product.name}</p><p><strong>💰 السعر:</strong> ${product.price} ريال</p><hr><p>1. اضغط على رقم الواتساب<br>2. اكتب رقم المنتج: ${product.code}<br>3. سيتم إرسال تفاصيل الدفع</p>`; 
            const msg = `مرحباً، أرغب في شراء المنتج رقم: ${product.code} - ${product.name} - السعر: ${product.price} ريال`; 
            document.getElementById('whatsappLink').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`; 
            modal.style.display = 'flex'; 
        }
        
        function copyProductCode() { 
            if(currentProductForWhatsapp) { 
                navigator.clipboard.writeText(currentProductForWhatsapp.code); 
                showToast(`✅ تم نسخ الرقم: ${currentProductForWhatsapp.code}`); 
            } 
        }
        
        function closeWhatsappModal() { 
            document.getElementById('whatsappModal').style.display = 'none'; 
        }

        function switchCategory(category) { 
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active-section')); 
            document.getElementById(`${category}-section`).classList.add('active-section'); 
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active')); 
            event.target.classList.add('active'); 
        }

        function showLoginModal() { 
            document.getElementById('loginModal').style.display = 'flex'; 
        }
        
        function closeLoginModal() { 
            document.getElementById('loginModal').style.display = 'none'; 
        }
        
        function loginAdmin() { 
            const user = document.getElementById('adminUsername').value; 
            const pass = document.getElementById('adminPassword').value; 
            if(user === 'admin' && pass === '123456') { 
                closeLoginModal(); 
                openAdminPanel(); 
            } else { 
                alert('خطأ في اسم المستخدم أو كلمة المرور'); 
            } 
        }
        
        function openAdminPanel() { 
            document.getElementById('adminPanel').style.display = 'block'; 
            displayAdminProducts(); 
        }
        
        function closeAdminPanel() { 
            document.getElementById('adminPanel').style.display = 'none'; 
        }

        function displayAdminProducts() { 
            const adminAccounts = document.getElementById('adminAccountsGrid'); 
            const adminGems = document.getElementById('adminGemsGrid'); 
            const adminSubs = document.getElementById('adminSubscriptionsGrid'); 
            adminAccounts.innerHTML = ''; 
            adminGems.innerHTML = ''; 
            adminSubs.innerHTML = ''; 
            storeData.accounts.forEach(p => adminAccounts.appendChild(createAdminProductCard(p, 'accounts'))); 
            storeData.gems.forEach(p => adminGems.appendChild(createAdminProductCard(p, 'gems'))); 
            storeData.subscriptions.forEach(p => adminSubs.appendChild(createAdminProductCard(p, 'subscriptions'))); 
        }

        function createAdminProductCard(p, category) {
            const div = document.createElement('div'); 
            div.className = 'admin-product-card';
            let imagesHTML = '';
            if(p.images && p.images.length) { 
                p.images.forEach((img, idx) => { 
                    imagesHTML += `<div class="image-item"><img src="${img}"><button class="remove-image-btn" onclick="removeImage(${p.id}, '${category}', ${idx})">×</button></div>`; 
                }); 
            }
            div.innerHTML = `<div class="images-gallery" id="gallery-${category}-${p.id}">${imagesHTML}</div>
            <div class="add-url-section"><label>🔗 إضافة صورة عبر رابط (ImgBB):</label><div class="url-input-group"><input type="text" id="image-url-${category}-${p.id}" placeholder="https://i.ibb.co/xxxxx/image.jpg"><button class="add-url-btn" onclick="addImageByUrl(${p.id}, '${category}')">➕ إضافة بالرابط</button></div></div>
            <input type="text" value="${p.code}" id="code-${category}-${p.id}" placeholder="رقم المنتج">
            <input type="text" value="${p.name}" id="name-${category}-${p.id}" placeholder="اسم المنتج">
            <textarea id="desc-${category}-${p.id}" rows="2">${p.desc}</textarea>
            <input type="number" value="${p.price}" id="price-${category}-${p.id}" placeholder="السعر">
            ${category === 'subscriptions' ? `<input type="text" value="${p.duration || ''}" id="duration-${category}-${p.id}" placeholder="المدة">` : ''}
            <div><button class="save-product-btn" onclick="saveProduct(${p.id}, '${category}')">💾 حفظ</button><button class="delete-product-btn" onclick="deleteProduct(${p.id}, '${category}')">🗑 حذف</button></div>`;
            return div;
        }

        function addImageByUrl(id, category) {
            const urlInput = document.getElementById(`image-url-${category}-${id}`);
            const imageUrl = urlInput.value.trim();
            if(!imageUrl) { 
                alert('الرجاء إدخال رابط الصورة'); 
                return; 
            }
            if(!imageUrl.startsWith('http')) {
                alert('الرجاء إدخال رابط صحيح يبدأ بـ http:// أو https://');
                return;
            }
            const product = storeData[category].find(p => p.id === id);
            if(product) { 
                if(!product.images) product.images = []; 
                product.images.push(imageUrl); 
                saveStoreData(); 
                displayAdminProducts(); 
                displayAll(); 
                urlInput.value = ''; 
                showToast('✅ تم إضافة الصورة بالرابط'); 
            }
        }

        function removeImage(id, category, index) { 
            const product = storeData[category].find(p => p.id === id); 
            if(product && product.images) { 
                product.images.splice(index, 1); 
                saveStoreData(); 
                displayAdminProducts(); 
                displayAll(); 
                showToast('🗑 تم حذف الصورة'); 
            } 
        }

        function saveProduct(id, category) {
            const product = storeData[category].find(p => p.id === id);
            if(product) {
                product.code = document.getElementById(`code-${category}-${id}`).value;
                product.name = document.getElementById(`name-${category}-${id}`).value;
                product.desc = document.getElementById(`desc-${category}-${id}`).value;
                product.price = parseInt(document.getElementById(`price-${category}-${id}`).value);
                if(category === 'subscriptions') product.duration = document.getElementById(`duration-${category}-${id}`).value;
                saveStoreData(); 
                displayAll(); 
                showToast('✅ تم حفظ التعديلات');
            }
        }

        function deleteProduct(id, category) { 
            if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) { 
                storeData[category] = storeData[category].filter(p => p.id !== id); 
                saveStoreData(); 
                displayAll(); 
                displayAdminProducts(); 
                showToast('🗑 تم حذف المنتج'); 
            } 
        }

        function addNewProductWithUrl() {
            const category = document.getElementById('newProductCategory').value;
            const name = document.getElementById('newProductName').value;
            const desc = document.getElementById('newProductDesc').value;
            const price = parseInt(document.getElementById('newProductPrice').value);
            const imageUrl = document.getElementById('newProductImageUrl').value.trim();
            
            if(!name || !desc || !price) { 
                alert('يرجى ملء جميع الحقول (الاسم، الوصف، السعر)'); 
                return; 
            }
            
            const newId = nextIds[category]++;
            let codePrefix = category === 'accounts' ? 'ACC' : (category === 'gems' ? 'GEM' : 'SUB');
            const newCode = `${codePrefix}${String(newId).padStart(3,'0')}`;
            const newProduct = { id: newId, code: newCode, name, desc, price, images: [] };
            if(category === 'subscriptions') newProduct.duration = "شهر";
            
            if(imageUrl && imageUrl.startsWith('http')) {
                newProduct.images.push(imageUrl);
            }
            
            storeData[category].push(newProduct);
            saveStoreData();
            displayAll();
            displayAdminProducts();
            showToast(`✅ تم إضافة المنتج - الرقم: ${newCode}`);
            
            document.getElementById('newProductName').value = '';
            document.getElementById('newProductDesc').value = '';
            document.getElementById('newProductPrice').value = '';
            document.getElementById('newProductImageUrl').value = '';
        }

        function saveAndDownload() {
            saveStoreData();
            DEFAULT_DATA = JSON.parse(JSON.stringify(storeData));
            displayAll();
            closeAdminPanel();
            setTimeout(() => {
                let htmlContent = document.documentElement.outerHTML;
                const defaultDataString = JSON.stringify(DEFAULT_DATA, null, 12);
                const oldDefaultDataString = JSON.stringify({
                    accounts: [], gems: [], subscriptions: []
                }, null, 12);
                htmlContent = htmlContent.replace(oldDefaultDataString, defaultDataString);
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; 
                a.download = 'index.html'; 
                a.click();
                URL.revokeObjectURL(url);
                showToast('✅ تم حفظ التعديلات وتحميل الملف');
            }, 500);
        }

        loadStoreData();
        displayAll();
    </script>
</body>
</html>
